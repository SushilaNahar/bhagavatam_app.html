<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Srimad Bhagavatam — Canto 1</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #e9c89a;
    --bg-darker:    #deba85;
    --bg-darkest:   #cb9356;
    --nav-bar:      #bd8a51;
    --maroon:       #9c2a18;
    --maroon-dark:  #7a1e10;
    --text:         #060302;
    --text-mid:     #2a1508;
    --text-muted:   #6a4520;
    --gold:         #835627;
    --gold-dark:    #6a4418;
    --border:       #c8a060;
    --border-light: #d8b878;
    --sit-bg:       #deba85;
    --sit-border:   #9c2a18;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { background: #e9c89a; }

  body {
    color: var(--text);
    font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
    font-size: 22px;
    line-height: 1.9;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ══ HEADER ══ */
  .site-header {
    background: var(--bg-darkest);
    border-bottom: 2px solid var(--border);
  }

  .header-inner {
    max-width: 780px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-om {
    font-size: 32px;
    color: var(--maroon);
    line-height: 1;
    font-family: serif;
  }

  .header-titles { flex: 1; }

  .header-main {
    font-family: 'Cinzel', serif;
    font-size: clamp(16px, 3.5vw, 22px);
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.04em;
    line-height: 1.2;
  }

  .header-sub {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    color: var(--text-mid);
    font-style: italic;
    margin-top: 2px;
  }

  .header-right {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    text-align: right;
    line-height: 1.5;
    font-family: 'EB Garamond', serif;
  }

  /* ══ BREADCRUMB ══ */
  .breadcrumb {
    background: var(--bg-darker);
    border-bottom: 1px solid var(--border);
    padding: 7px 20px;
  }

  .breadcrumb-inner {
    max-width: 780px;
    margin: 0 auto;
    font-size: 14px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'EB Garamond', serif;
  }

  .bc-link { color: var(--maroon); cursor: pointer; font-weight: 500; }
  .bc-link:hover { text-decoration: underline; }
  .bc-sep { color: var(--border); }

  /* ══ HOME ══ */
  #home-body {
    max-width: 780px;
    margin: 0 auto;
    padding: 36px 20px 80px;
  }

  .ornament {
    text-align: center;
    font-size: 26px;
    color: var(--gold);
    margin: 8px 0 20px;
    line-height: 1;
  }

  .canto-title-block {
    text-align: center;
    padding-bottom: 8px;
    margin-bottom: 8px;
  }

  .canto-label {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--gold-dark);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .canto-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 600;
    color: var(--text);
    line-height: 1.25;
  }

  .canto-subtitle {
    font-family: 'EB Garamond', serif;
    font-size: 17px;
    color: var(--text-mid);
    font-style: italic;
    margin-top: 6px;
  }

  .hr-ornament {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 28px;
  }

  /* Chapter list */
  .chapter-list { display: flex; flex-direction: column; gap: 3px; }

  .chapter-item {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border-light);
    background: var(--bg-darker);
    transition: background 0.15s, border-color 0.15s;
  }

  .chapter-item.available { cursor: pointer; }

  .chapter-item.available:hover {
    background: var(--bg-darkest);
    border-color: var(--border);
  }

  .chapter-num-col {
    background: var(--bg-darkest);
    border-right: 1px solid var(--border-light);
    padding: 12px 14px;
    min-width: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--text-muted);
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }

  .chapter-item.available:hover .chapter-num-col {
    background: var(--maroon);
    color: var(--bg);
    border-right-color: var(--maroon);
  }

  .chapter-body {
    padding: 12px 16px;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .chapter-title-text {
    font-size: 20px;
    color: var(--maroon);
    line-height: 1.4;
    font-family: 'EB Garamond', serif;
    font-weight: 500;
  }

  .chapter-item.available:hover .chapter-title-text {
    color: var(--maroon-dark);
  }

  .chapter-meta {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
    font-style: italic;
  }

  .chapter-arrow {
    color: var(--maroon);
    font-size: 22px;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
    flex-shrink: 0;
  }

  .chapter-item.available:hover .chapter-arrow {
    opacity: 1;
    transform: translateX(3px);
  }

  .chapter-item.coming-soon { opacity: 0.5; }

  /* ══ CHAPTER SCREEN ══ */
  #chapter-body {
    max-width: 780px;
    margin: 0 auto;
    padding: 36px 20px 80px;
  }

  .chapter-title-block {
    text-align: center;
    margin-bottom: 8px;
    padding-bottom: 8px;
  }

  .chapter-num-label {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--gold-dark);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .chapter-main-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .chapter-ornament {
    text-align: center;
    font-size: 22px;
    color: var(--gold);
    margin: 10px 0 28px;
  }

  /* ── ACCORDION ── */
  .section-block {
    border: 1px solid var(--border-light);
    margin-bottom: 5px;
    background: var(--bg-darker);
    overflow: hidden;
  }

  .section-block.open {
    border-color: var(--border);
    box-shadow: 0 2px 8px rgba(100,50,0,0.12);
  }

  .section-header {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    user-select: none;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-left-color 0.15s;
    background: var(--bg-darker);
  }

  .section-header:hover {
    background: var(--bg-darkest);
    border-left-color: var(--maroon);
  }

  .section-block.open .section-header {
    background: var(--bg-darkest);
    border-left-color: var(--maroon);
    border-bottom: 1px solid var(--border-light);
  }

  .section-header-left { flex: 1; min-width: 0; }

  .section-num {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--gold-dark);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .section-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--maroon);
    line-height: 1.3;
    font-family: 'EB Garamond', serif;
  }

  .section-texts {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
    margin-top: 2px;
    font-family: 'EB Garamond', serif;
  }

  .section-chevron {
    color: var(--maroon);
    font-size: 22px;
    transition: transform 0.3s ease;
    flex-shrink: 0;
    line-height: 1;
  }

  .section-block.open .section-chevron { transform: rotate(180deg); }

  /* SECTION BODY — full width */
  .section-body {
    display: none;
    width: 100%;
    background: var(--bg);
    padding: 30px 26px 26px;
    border-left: 3px solid var(--maroon);
    animation: fadeIn 0.25s ease;
  }

  .section-block.open .section-body { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── CONTENT ── */
  .section-body p {
    font-size: 22px;
    line-height: 1.9;
    color: var(--text);
    margin-bottom: 20px;
    text-align: justify;
    font-family: 'EB Garamond', serif;
  }

  .section-body p:last-child { margin-bottom: 0; }

  .sub-heading {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--maroon);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin: 24px 0 10px;
    font-weight: 600;
  }

  .sub-heading:first-child { margin-top: 0; }

  .quote-block {
    border-left: 3px solid var(--gold);
    padding: 12px 20px;
    margin: 18px 0;
    background: var(--bg-darker);
  }

  .quote-block p {
    font-style: italic !important;
    color: var(--text-mid) !important;
    font-size: 21px !important;
    margin-bottom: 0 !important;
    text-align: left !important;
  }

  .sit-with-this {
    margin-top: 26px;
    padding: 18px 22px;
    background: var(--sit-bg);
    border: 1px solid var(--border);
    border-left: 4px solid var(--maroon);
  }

  .sit-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--maroon);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .sit-with-this p {
    font-style: italic !important;
    color: var(--text-mid) !important;
    font-size: 21px !important;
    line-height: 1.85 !important;
    margin-bottom: 0 !important;
    text-align: left !important;
  }

  em     { font-style: italic; }
  strong { font-weight: 700; }

  /* ── FOOTER ── */
  .site-footer {
    background: var(--bg-darker);
    border-top: 1px solid var(--border);
    padding: 18px 20px;
    text-align: center;
    font-size: 14px;
    color: var(--text-muted);
    font-style: italic;
    font-family: 'EB Garamond', serif;
  }

  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: var(--bg-darker); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 480px) {
    #home-body, #chapter-body { padding: 24px 14px 60px; }
    .section-body { padding: 22px 14px 20px; }
    .header-right { display: none; }
    body { font-size: 20px; }
  }
</style>
</head>

<script>
const chapters = [
  {
    num: 1, title: "Questions by the Sages", available: true,
    sections: [
      { title: "The Opening Prayer", texts: "Text 1", content: `
        <p>The Bhāgavatam does not simply begin — it <strong>bows down first</strong>. The very first verse is a prayer to Kṛṣṇa. Vyāsadeva, the author, offers his respectful obeisances before writing a single word. That itself is a teaching — before we receive this knowledge, we bow.</p>
        <p class="sub-heading">What does Vyāsadeva say about Kṛṣṇa?</p>
        <p>Kṛṣṇa is the <em>cause of all causes</em> — not just the creator of this universe, but the very source behind all creation, all maintenance, and all destruction. Nothing exists independently of Him. He is directly and indirectly conscious of everything — nothing is hidden from Him. He is completely independent — there is no cause behind Him. He simply <em>is</em>.</p>
        <p>He first gave Vedic knowledge to Brahmā — so even the first and greatest created being received his wisdom as a gift from Kṛṣṇa. His Māyā is so powerful that even great sages and demigods are bewildered by it — like mistaking a mirage for real water. And yet — Kṛṣṇa Himself lives in a <em>transcendental abode</em> completely untouched by all of this. The whole creation, with all its drama, is like a dream. He is the eternal reality behind it.</p>
        <p>This single verse is like the entire Bhāgavatam in seed form. Everything that follows is an expansion of what is said here.</p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Kṛṣṇa is described as the cause behind everything — including the illusion that makes unreal things seem real. Does that land for you, or does it raise any questions?</p></div>
      `},
      { title: "What is the Bhāgavatam?", texts: "Texts 2–3", content: `
        <p>Before the story even begins, Vyāsadeva tells us exactly what kind of book this is — and it makes some extraordinary claims.</p>
        <p class="sub-heading">Text 2</p>
        <p>This book <strong>completely rejects</strong> all religion done for material reasons — rituals for wealth, health, heaven, good harvest. It deals only with the <em>highest truth</em> — accessible to those who are <strong>pure in heart</strong>. Not necessarily learned. Pure in heart. That highest truth uproots the <em>three miseries</em> — from our own mind and body, from other living beings, and from nature. And the most stunning claim — <strong>this book alone is sufficient for God realization.</strong> Simply by hearing it attentively and submissively, the Supreme Lord becomes established in your heart. Not through ritual. Through <em>hearing</em>.</p>
        <p class="sub-heading">Text 3</p>
        <p>The Bhāgavatam is the <em>ripest fruit of the tree of Vedic knowledge</em> — the final, most mature expression of everything. It came through the lips of Śukadeva Gosvāmī — and because of that, it became even sweeter. Like fruit made more delicious when offered with love. It is relishable even for liberated souls — people who have already gone beyond material existence still want to hear it.</p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>The text says the Bhāgavatam works through attentive and submissive hearing — not effort, not ritual, not scholarship. Just open, humble listening. Is there any part of you reading to evaluate rather than to receive?</p></div>
      `},
      { title: "The Setting & Who is Sūta Gosvāmī", texts: "Texts 4–8", content: `
        <p class="sub-heading">The Place — Naimiṣāraṇya</p>
        <p>A group of great sages have gathered in the holy forest of <em>Naimiṣāraṇya</em> for a <strong>thousand-year sacrifice</strong> — not for themselves, but entirely for the pleasure of the Lord and His devotees. Into this sacred gathering walks <strong>Sūta Gosvāmī</strong>. The sages immediately offer him an elevated seat of honor — not because of his birth, but because of what he carries inside him. <em>True honor goes to the one who carries true knowledge.</em></p>
        <p class="sub-heading">Who is Sūta Gosvāmī?</p>
        <p><strong>Free from vice</strong> — his character is pure. Knowledge in a pure vessel stays pure. <strong>Deeply learned</strong> — trained under proper guidance in all the scriptures. He didn't just read books. He learned at the feet of masters. And most importantly, <strong>submissive</strong> — because of his gentleness, his spiritual masters gave him everything. Every blessing, every realization flowed to him because he never made himself bigger than his teachers.</p>
        <p>Sūta Gosvāmī is essentially a <em>transparent medium</em> — he received purely, and now he will give purely. This is the <strong>paramparā</strong> — the chain of disciplic succession. Knowledge flows from heart to heart, teacher to student, when the student is truly humble.</p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>The sages honored Sūta Gosvāmī not for his birth or status but for what he carried within him and how humbly he carried it. In your own life — who do you go to for wisdom? And do you approach them with that same quality of submission?</p></div>
      `},
      { title: "The Five Questions of the Sages", texts: "Texts 9–23", content: `
        <p>The sages give context before asking. They say — look at the age we are living in. <strong>Kali Yuga.</strong> People are short-lived, quarrelsome, lazy, misguided, and constantly disturbed. There are thousands of scriptures with thousands of instructions. Nobody has the time or clarity to follow all of it. So please — <em>give us only the essence.</em></p>
        <p class="sub-heading">The Five Questions</p>
        <div class="quote-block"><p><strong>1.</strong> What is the <strong>highest good</strong> — the absolute and ultimate good for all people? <em>(Text 9)</em></p></div>
        <div class="quote-block"><p><strong>2.</strong> What is the <strong>essence of all scriptures</strong>? Since there are so many and people cannot follow all of them — what is the single essential teaching? <em>(Text 11)</em></p></div>
        <div class="quote-block"><p><strong>3.</strong> <strong>Why did the Lord appear as Kṛṣṇa</strong>, son of Vasudeva and Devakī? What was the purpose of that specific incarnation? <em>(Text 12)</em></p></div>
        <div class="quote-block"><p><strong>4.</strong> What are <strong>His various incarnations and their pastimes</strong>, as taught by the previous ācāryas? <em>(Texts 13, 17, 18)</em></p></div>
        <div class="quote-block"><p><strong>5.</strong> <strong>Now that Kṛṣṇa has departed</strong>, to whom have the religious principles gone for shelter? Where does dharma reside now? <em>(Text 23)</em></p></div>
        <p>Together these five questions form a complete map. The entire Bhāgavatam — all 12 Cantos — is essentially Sūta Gosvāmī's answer to these five questions.</p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Out of these five questions — which one feels most alive and personal to you right now? Which question, if answered deeply, would most change how you live or how you practice?</p></div>
      `}
    ]
  },
  {
    num: 2, title: "Divinity and Divine Service", available: true,
    sections: [
      { title: "The Opening Obeisances", texts: "Texts 1–4", content: `
        <p>Before Sūta Gosvāmī speaks a single word of answer, he does two things — he <em>appreciates the questions</em> and then he <em>bows down</em>.</p>
        <p><strong>Text 1</strong> — Sūta Gosvāmī was <em>fully satisfied</em> by the questions of the sages. A true teacher doesn't just tolerate questions — he is <em>nourished</em> by them. Good questions from sincere hearts actually please a devotee.</p>
        <p><strong>Text 2</strong> is deeply moving. He offers obeisances to his teacher <strong>Śukadeva Gosvāmī</strong>. When Śukadeva left home as a young man to take sannyāsa, his father Vyāsadeva cried out in grief. Śukadeva didn't even turn back — so absorbed in the divine that worldly ties had no hold on him. The only response came from the <em>trees</em> — moved by the separation, they echoed the father's call.</p>
        <p><strong>Text 3</strong> — Śukadeva spoke the Bhāgavatam not for the learned or the liberated — but out of <strong>great compassion</strong> for ordinary, struggling human beings. He spoke it after <em>personally assimilating it through experience</em>. This was not book knowledge. This was <em>lived</em> knowledge.</p>
        <p><strong>Text 4</strong> — The formal invocation. Sūta Gosvāmī bows to Nārāyaṇa, to Nara-Nārāyaṇa Ṛṣi, to Mother Sarasvatī, and to Vyāsadeva — before opening his mouth to speak.</p>
        <p>Three consecutive chapters begin with bowing down. The Bhāgavatam is quietly showing us how knowledge moves — always through a chain of humble, grateful hearts. <em>Nobody claims the knowledge as their own. Everyone points upward.</em></p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Śukadeva left home so absorbed in God that even his father's cry didn't turn him back. And yet he returned — out of compassion for suffering humanity. What moves <em>you</em> to turn back toward the world? Is it obligation, love, compassion — or something else?</p></div>
      `},
      { title: "What is the Highest Good?", texts: "Texts 5–10", content: `
        <p>In <strong>Text 5</strong>, Sūta Gosvāmī appreciates the questions once more. Questions about Kṛṣṇa are inherently <em>auspicious</em> — the very act of asking does good to the world.</p>
        <p class="sub-heading">Text 6 — The Direct Answer</p>
        <div class="quote-block"><p>The supreme occupation for all humanity is that by which one can attain loving devotional service unto the Lord — and that service must be <strong>unmotivated</strong> and <strong>uninterrupted</strong>.</p></div>
        <p>This is the answer. Clean and complete. The highest good for every human being is <strong>Bhakti</strong>. Unmotivated — not done for any personal gain. Pure love has no agenda. Uninterrupted — not occasional, not seasonal. Constant. Like breathing.</p>
        <p class="sub-heading">Text 7 — The Surprising Bonus</p>
        <p>When you render devotional service to Kṛṣṇa, you <em>immediately</em> and <em>automatically</em> gain <strong>causeless knowledge</strong> and <strong>detachment from the world</strong>. We normally think — first get knowledge, then detachment, then maybe do bhakti. Sūta Gosvāmī says — <em>just do bhakti and the rest follows automatically.</em></p>
        <p class="sub-heading">Texts 8–10</p>
        <p>All work is useless labor if it does not provoke attraction for Kṛṣṇa. Life's desires should never be directed toward sense gratification. One should desire only a healthy life — self-preservation — since a human being is meant for <em>inquiry into the Absolute Truth</em>. The human form is rare and precious precisely because it alone can ask: <em>Who am I? What is God? What is the purpose of existence?</em></p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Text 7 says bhakti automatically produces knowledge and detachment. Have you ever noticed that when you felt genuinely close to God, worldly things naturally felt a little less urgent? That quiet shift — that is what this verse is pointing at.</p></div>
      `},
      { title: "The Three Ways of Knowing the Absolute Truth", texts: "Texts 11–13", content: `
        <p>The Absolute Truth is <strong>one</strong>. But depending on how deep you go in your realization, you experience that same reality in three ways:</p>
        <p><strong>Brahman</strong> — the impersonal, all-pervading divine light. Like the sunshine that fills everything. The experience of the <em>jñānī</em> who dissolves the ego into the infinite.</p>
        <p><strong>Paramātmā</strong> — the Supersoul within every heart. God not as something far away but as the <em>witness within you</em> — closer than your own breath. The experience of the <em>yogī</em> who goes deep within through meditation.</p>
        <p><strong>Bhagavān</strong> — the Supreme Personality of Godhead. God as a <em>person</em> — with form, qualities, love, and pastimes. Kṛṣṇa. The experience of the <em>bhakta</em> who enters into a personal loving relationship with the divine.</p>
        <div class="quote-block"><p>Brahman is like seeing the <em>sunshine</em>. Paramātmā is like seeing the <em>sun disc</em>. Bhagavān is like entering the <em>sun planet itself</em> and meeting the source of all that light personally.</p></div>
        <p>Even for the philosopher equipped with knowledge and detachment, the final realization comes through <strong>devotional service</strong>. Jñāna and yoga are incomplete without bhakti. They can take you to Brahman and Paramātmā. But to know Bhagavān — to know Kṛṣṇa personally — <em>you must love Him.</em></p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Most of us relate to God in one of these three ways — sometimes as a vast formless presence, sometimes as a quiet inner witness, sometimes as a personal loving God. Which of these three feels most natural and alive for you right now? Has that changed at different points in your life?</p></div>
      `},
      { title: "The Path: Hearing, Remembering, Worshipping", texts: "Texts 14–22", content: `
        <p>This is the most <em>practically devotional</em> section of the chapter — describing the progressive journey of the heart through bhakti.</p>
        <p class="sub-heading">Text 14 — The Four Practices</p>
        <p>With one-pointed attention, one should constantly <strong>hear, glorify, remember</strong> and <strong>worship</strong> the Personality of Godhead — śravaṇam, kīrtanam, smaraṇam, arcanam. These are the actual daily life of a devotee.</p>
        <p class="sub-heading">Text 15 — The Sword of Remembrance</p>
        <p>All of us carry <em>karmic knots</em> — accumulated reactions that bind us and create our suffering. What cuts through them? Not rituals. Not austerity. Simply <strong>remembering Kṛṣṇa</strong> — available to everyone, at every moment, at no cost.</p>
        <p class="sub-heading">Text 16 — Saintly Association</p>
        <p>You cannot develop a taste for Kṛṣṇa through individual effort alone. Something happens in the presence of pure devotees that cannot happen in isolation. Their love is contagious. First you serve the devotees — then you gain the <em>taste</em>. The taste itself is a gift that comes through association.</p>
        <p class="sub-heading">Texts 17–19 — The Cleansing of the Heart</p>
        <p>Kṛṣṇa Himself, seated in your heart as Paramātmā, begins to <em>cleanse material desires from within</em>. You don't forcibly remove them — Kṛṣṇa does it from the inside. Loving service becomes <strong>irrevocable</strong> — a permanent fixture of the heart. And then lust and hankering simply disappear. Not by struggle. <em>They just go.</em></p>
        <div class="quote-block"><p>Hear about Kṛṣṇa → develop taste → Kṛṣṇa cleanses your heart → loving service becomes irrevocable → lust falls away naturally → established in goodness → <strong>completely happy</strong>.</p></div>
        <p>The Bhāgavatam's path is not suppression — it is <em>replacement</em>. When something more beautiful enters the heart, lesser things lose their grip.</p>
        <p class="sub-heading">Texts 20–22</p>
        <p>The <em>knot in the heart</em> is pierced — the fundamental belief that we are this body, this name, this story. That knot is the root of all suffering, pierced by the direct experience of Kṛṣṇa through bhakti. Since time immemorial, all great souls have arrived at the same place — <strong>joyful, loving service to Kṛṣṇa</strong>. Everything else eventually tires us. Bhakti never does.</p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Think of one attachment in your life that has loosened over time — not because you fought it, but because something better quietly took its place. That loosening — however small — is bhakti working.</p></div>
      `},
      { title: "The Three Modes & Why Viṣṇu is Supreme", texts: "Texts 23–27", content: `
        <p class="sub-heading">Text 23</p>
        <p>The transcendental Lord is indirectly associated with the three modes: <strong>Brahmā</strong> — creator — carries <em>passion</em> (rajas). <strong>Śiva</strong> — destroyer — carries <em>ignorance</em> (tamas). <strong>Viṣṇu</strong> — maintainer — carries <em>goodness</em> (sattva). But Viṣṇu is not merely a god of goodness — He is the <em>Supreme Lord Himself</em>. Brahmā and Śiva are His expansions for specific cosmic functions. Only Viṣṇu can give ultimate liberation.</p>
        <p class="sub-heading">Text 24 — The Ladder of the Three Modes</p>
        <div class="quote-block"><p>Raw wood is <em>tamas</em>. Smoke is better — that is <em>rajas</em>. Fire is the purest — that is <em>sattva</em>. But even fire is still material. The goal is to go beyond all three modes entirely — only possible through Viṣṇu, through bhakti.</p></div>
        <p class="sub-heading">Texts 25–27</p>
        <p>The great sages worshipped Viṣṇu specifically because He exists <em>above the three modes</em>. People in passion and ignorance worship demigods seeking wealth, power, and progeny. There is no condemnation here — just clear observation. <em>Where your desire is, that is where your worship goes. And where your worship goes, that is what you get.</em></p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Right now — in this season of your life — what are you truly seeking from God when you pray? Material security? Peace of mind? Liberation? Pure love? Just sit with that honestly. Knowing your true seeking is the beginning of clarity.</p></div>
      `},
      { title: "Kṛṣṇa is the Goal of Everything", texts: "Texts 28–34", content: `
        <p>This final section is the grand conclusion of Chapter 2 — breathtaking in its scope.</p>
        <p class="sub-heading">Texts 28–29 — Everything Points to Kṛṣṇa</p>
        <div class="quote-block"><p>In the revealed scriptures, the ultimate object of knowledge is Śrī Kṛṣṇa. The purpose of sacrifice is to please Him. Yoga is for realizing Him. All fruitive activities are rewarded by Him. He is supreme knowledge. All austerities are performed to know Him. Religion is rendering loving service unto Him. <strong>He is the supreme goal of life.</strong></p></div>
        <p>Every path — knowledge, sacrifice, yoga, karma, austerity, religion — every single path ultimately has <em>one destination</em>. Kṛṣṇa. Not different destinations for different paths. One destination. Him.</p>
        <p class="sub-heading">Texts 30–34</p>
        <p>The Lord created the energies of cause and effect by His own internal energy, then expanded Himself and entered into creation — always fully enlightened in His transcendental position. He pervades all things as fire permeates wood. The same Kṛṣṇa is simultaneously within you as Paramātmā, pervading everything as Brahman, and descending personally as Bhagavān. <em>Three aspects, one reality, one love.</em></p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Everything — every path, every practice, every scripture — ultimately points to Kṛṣṇa. Does that feel like a restriction to you, or does it feel like a relief? Like finally finding out that all roads, however winding, lead home?</p></div>
      `}
    ]
  },
  {
    num: 3, title: "Kṛṣṇa is the Source of All Incarnations", available: true,
    sections: [
      { title: "The Puruṣa — The Original Form", texts: "Texts 1–5", content: `
        <p>At the end of Chapter 2, we learned that Kṛṣṇa is the goal of everything — the source behind all creation. Now Chapter 3 opens by showing us <em>how</em> that creation actually happens. And it begins with one of the most breathtaking images in all of scripture.</p>
        <p class="sub-heading">Text 1 — The First Expansion</p>
        <p>Before anything exists — before planets, before time, before even the ingredients of the universe — the Lord expands Himself into what is called the <strong>puruṣa</strong> form. Think of this as the Lord taking on a cosmic body specifically for the purpose of creation. From this one expansion, all the sixteen basic ingredients of material existence come into being. The entire universe begins here — not from chance, not from chaos, but from a <em>conscious, deliberate expansion of the Lord Himself.</em></p>
        <p class="sub-heading">Text 2 — The Lotus and Brahmā</p>
        <p>A part of this puruṣa form lies down within the waters of the universe. From His navel, a lotus stem sprouts upward. And from the flower of that lotus, <strong>Brahmā</strong> — the master engineer of the universe — comes into existence. This is the image you see in so many ancient paintings and carvings — Viṣṇu reclining on the cosmic ocean, with Brahmā emerging from His navel on a lotus. It is not mythology. It is a description of how consciousness gives rise to creation.</p>
        <p class="sub-heading">Text 3 — Eternally Spiritual</p>
        <p>All the planetary systems of the universe rest upon the body of this puruṣa. And yet — He has <em>nothing to do</em> with the created material ingredients. His body is not material. It is eternally spiritual. He enters into creation without being affected by it — the way sunlight enters a room without becoming the room.</p>
        <p class="sub-heading">Text 4 — The Vision of the Devotees</p>
        <p>This verse is deeply moving. It says that <strong>devotees with their perfect eyes</strong> can see the transcendental form of the puruṣa — with thousands of legs, arms, faces, heads, eyes, noses — all extraordinary, all decorated and glowing. Why thousands? Because He is <em>all-pervading</em> — present in every direction, in every being, in every corner of existence. This is the vision of a realized soul seeing the Lord as the very fabric of all existence. And only devotees can see this. Not philosophers. Not scientists. <em>Devotees.</em></p>
        <p class="sub-heading">Text 5 — The Seed of All Incarnations</p>
        <p>This puruṣa form is described as the <strong>indestructible seed</strong> of all the incarnations that will follow. From particles and portions of this form, different living entities come into being — demigods, human beings, and all others. And from this same source, all the avatāras of the Lord will descend into the universe age after age.</p>
        <p><em>If Kṛṣṇa is the sun, the puruṣa is the sunlight that fills the universe. And all the incarnations that follow are like individual rays — each one distinct, each one carrying the full warmth and light of the source.</em></p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Text 4 says devotees can see with <em>perfect eyes</em> — eyes purified by devotion — what ordinary vision cannot perceive. What does it mean to you that seeing God is not a matter of intelligence or scholarship but of <em>love</em>? Does that feel like good news — or does it raise something in you?</p></div>
      `},
      { title: "The 22 Incarnations", texts: "Texts 6–25", content: `
        <p>Now begins one of the most extraordinary passages in the entire Bhāgavatam — a sweeping vision of the Lord descending into the universe again and again, age after age, in form after form, each time for a specific purpose. Each incarnation is like a different facet of the same infinite diamond.</p>
        <p class="sub-heading">The Kumāras (Text 6)</p>
        <p>Four young celibate boys, sons of Brahmā, who chose renunciation from birth and underwent severe austerities for realization of the Absolute Truth. The Lord descends first not as a warrior or a king, but as <em>seekers</em> — showing that the search for truth itself is divine.</p>
        <p class="sub-heading">The Boar — Varāha (Text 7)</p>
        <p>The earth had been dragged to the bottom of the cosmic ocean by a demon. The Lord took the form of a massive boar, dived into the depths, lifted the earth on His tusks and restored it. What a tender image — the Lord carrying the entire earth, delicately balanced. He who holds up the universe does so with <em>love</em>, not force.</p>
        <p class="sub-heading">Nārada (Text 8)</p>
        <p>The great sage among the demigods. He traveled the three worlds singing the Lord's glories, collecting the essence of the Vedas dealing with devotional service. This incarnation is not a fighter or a creator — He is a <em>singer</em>. A wandering devotee. The Lord descends as pure bhakti personified.</p>
        <p class="sub-heading">Nara-Nārāyaṇa (Text 9)</p>
        <p>Twin sons of King Dharma, who undertook severe and exemplary penances to control the senses. The Lord descends here to show that even He performs austerity — not because He needs to, but to set an example for all seeking souls.</p>
        <p class="sub-heading">Lord Kapila (Text 10)</p>
        <p>The foremost among perfected beings, who gave the world the philosophy of Sāṅkhya — the deep analysis of the elements of creation and the nature of the self. In course of time this knowledge had been lost. The Lord descends simply to restore it.</p>
        <p class="sub-heading">Dattātreya (Text 11)</p>
        <p>Son of the sage Atri, born from the womb of the devoted Anasūyā who prayed for an incarnation. He spoke on transcendence to Alarka, Prahlāda and others. The Lord descends here in response to a mother's pure prayer — born out of devotion itself.</p>
        <p class="sub-heading">Yajña (Text 12)</p>
        <p>The Lord descends to maintain cosmic order during the transition between Manus — the vast cycles of time that govern the universe. He controls entire epochs, assisted by His own son Yāma. Even time itself is managed by His loving attention.</p>
        <p class="sub-heading">King Ṛṣabha (Text 13)</p>
        <p>He showed the path of perfection — complete sense control, honored by all orders of life. He walked the earth as a king who had renounced everything, demonstrating through His very life that true royalty is mastery of the self.</p>
        <p class="sub-heading">King Pṛthu (Text 14)</p>
        <p>Prayed for by sages, He appeared as a king who cultivated the earth to yield its produce. Because of Him the earth became beautiful and abundant. The Lord descends here simply to <em>feed His children</em>.</p>
        <p class="sub-heading">The Fish — Matsya (Text 15)</p>
        <p>When the whole world was deep within water, the Lord became a fish and protected Vaivasvata Manu, keeping him safe on a boat. The greatest of all beings becomes a small fish — to save one devotee. This is the nature of divine love.</p>
        <p class="sub-heading">The Tortoise — Kūrma (Text 16)</p>
        <p>When the gods and demons churned the cosmic ocean, the churning rod — the great mountain Mandarācala — began to sink. The Lord became a tortoise and held the mountain on His back. The weight of the entire universe — and He bears it without complaint.</p>
        <p class="sub-heading">Dhanvantari and Mohinī (Text 17)</p>
        <p>In the twelfth incarnation the Lord appeared as <strong>Dhanvantari</strong>, the divine physician, bearer of the nectar of immortality. In the thirteenth He appeared as <strong>Mohinī</strong> — a beautiful woman — to bewilder the demons and ensure the nectar reached the demigods. The Lord uses beauty itself as an instrument of divine purpose.</p>
        <p class="sub-heading">Nṛsiṁha (Text 18)</p>
        <p>Half-man, half-lion. He tore apart the body of the atheist Hiraṇyakaśipu with His nails. But do not see this as violence alone. Hiraṇyakaśipu had tormented his own son Prahlāda — a pure devotee — mercilessly. The Lord descended in a form that could not be categorized as man or animal, indoors or outdoors, day or night — because the demon had obtained a boon protecting him from all conventional harm. <em>Love for His devotee made the Lord find a way where there seemed to be none.</em></p>
        <p class="sub-heading">Vāmana (Text 19)</p>
        <p>A dwarf brāhmaṇa who visited the arena of King Bali's great sacrifice. Though at heart willing to reclaim the three worlds, He simply asked for three steps of land. When Bali agreed, those three steps covered the entire universe. The Lord who contains everything presents Himself as a small child asking for almost nothing — and receives everything. What beautiful humility in the divine.</p>
        <p class="sub-heading">Paraśurāma (Text 20)</p>
        <p>He annihilated the administrative class twenty-one times, angry at their rebellion against the brāhmaṇas. When power forgets its sacred duty to protect the wise and the innocent, the Lord Himself comes to correct it.</p>
        <p class="sub-heading">Vyāsadeva (Text 21)</p>
        <p>He appeared in the womb of Satyavatī through the sage Parāśara, and divided the one Veda into several branches and sub-branches. Seeing that people in general were less intelligent, He made the divine knowledge more accessible. The greatest literary gift in human history — given out of compassion.</p>
        <p class="sub-heading">Lord Rāma (Text 22)</p>
        <p>He controlled the Indian Ocean and killed the atheist Rāvaṇa. But more than the feat — the Lord chose to live as a human being, accepting every limitation, every sorrow, every exile — to show us that even within the constraints of human life, <em>perfect righteousness is possible.</em></p>
        <p class="sub-heading">Balarāma and Kṛṣṇa (Text 23)</p>
        <p>Together They appeared in the Yadu dynasty and removed the burden of the world. These are the most intimate, the most personal of all the incarnations. Not distant cosmic forces — but friends, brothers, lovers of the soul.</p>
        <p class="sub-heading">Lord Buddha (Text 24)</p>
        <p>At the beginning of Kali-yuga, He will appear to bewilder those who are envious of the faithful. A compassionate deception — to draw away from animal sacrifice those who were misusing Vedic religion for cruelty.</p>
        <p class="sub-heading">Kalki (Text 25)</p>
        <p>At the conjunction of two yugas, when almost all rulers of the earth have become plunderers, the Lord will descend on a white horse and restore righteousness. He has not yet come. <strong>But He is coming.</strong></p>
        <p><em>Step back for a moment and feel the sweep of this. From the beginning of creation to its very end — through every age, every civilization, every cosmic cycle — the Lord is never absent. He appears wherever He is needed, in whatever form love requires. As a fish. As a tortoise. As a wandering sage. As a child. As a warrior. As a poet. As a friend. This is not mythology. This is a love story told on a cosmic scale.</em></p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Out of all these twenty-two incarnations — which one moves you most deeply right now? Not the most impressive or the most famous. But the one that feels most <em>personal</em> — as if the Lord descended specifically for someone like you.</p></div>
      `},
      { title: "Kṛṣṇa is the Source of All", texts: "Texts 26–29", content: `
        <p>After this magnificent parade of incarnations, Sūta Gosvāmī pauses and makes four statements that are the philosophical crown of the chapter.</p>
        <p class="sub-heading">Text 26 — Innumerable Incarnations</p>
        <div class="quote-block"><p>The incarnations of the Lord are innumerable, like rivulets flowing from inexhaustible sources of water.</p></div>
        <p>What we have just heard — twenty-two incarnations — is not a complete list. It is simply a glimpse. The Lord's descents are without limit, flowing endlessly from an inexhaustible source. Every age, every planet, every need — He responds. The ocean of divine compassion never runs dry.</p>
        <p class="sub-heading">Text 27 — The Great Beings are His Portions</p>
        <p>All the ṛṣis, Manus, demigods — all the great and powerful beings of the universe — are themselves plenary portions or portions of the plenary portions of the Lord. Even the greatest beings in existence are simply rays from His light. Nothing in creation is truly independent of Him.</p>
        <p class="sub-heading">Text 28 — Kṛṣṇa is the Original</p>
        <div class="quote-block"><p>All of the above-mentioned incarnations are either plenary portions or portions of the plenary portions of the Lord, but Lord Śrī Kṛṣṇa is the original Personality of Godhead.</p></div>
        <p>All incarnations are real. All are divine. All are worthy of the deepest reverence. But they all flow <em>from</em> Kṛṣṇa — as rivers flow from the ocean. He is not one incarnation among many. He is the source from which all others emerge. And they all appear whenever atheism disturbs the world — to protect the faithful, to restore balance, to bring the lost ones home.</p>
        <p class="sub-heading">Text 29 — The Power of Simply Hearing</p>
        <p>Whoever carefully recites the mysterious appearances of the Lord, with devotion in the morning and in the evening, gets relief from all miseries of life. Notice — it says <em>recites with devotion</em>. Not analyzes. Not debates. Simply recites — morning and evening — with love. The stories of the Lord's incarnations are not history lessons. <strong>They are medicine.</strong></p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Text 28 says Kṛṣṇa is the <em>original</em> — and all others flow from Him. Does knowing that all the great beings, all the divine powers, all the incarnations are ultimately one connected family flowing from one source — does that make the divine feel closer to you or more distant?</p></div>
      `},
      { title: "Beyond All Material Forms", texts: "Texts 30–39", content: `
        <p>Now the chapter shifts into deeper philosophical waters. Having described the Lord's many forms, Sūta Gosvāmī addresses a profound question — what is the nature of <em>form</em> itself? And how can we truly <em>know</em> the Lord?</p>
        <p class="sub-heading">Texts 30–32 — The Illusion of Material Form</p>
        <p>The great cosmic form — the virāṭ-rūpa — that idea of the Lord having a universal body made of mountains, oceans and planets? That is described here as <strong>imaginary</strong>. It is not false exactly — but it is a <em>concession</em> made for less intelligent or beginning seekers who cannot yet conceive of the formless spiritual reality.</p>
        <p>A beautiful analogy — clouds are carried by air, but foolish people say the sky is cloudy and the air is dirty. In the same way, we superimpose material qualities on the spiritual self. We mistake the cloud for the sky. Beyond the gross form is a subtle form — unseen, unheard, unmanifest. And beyond even that is the true spiritual self — which must exist, because otherwise how could there be repeated births?</p>
        <p class="sub-heading">Text 33 — The Moment of Liberation</p>
        <div class="quote-block"><p>Whenever a person experiences, by self-realization, that both the gross and subtle bodies have nothing to do with the pure self, at that time he sees himself as well as the Lord.</p></div>
        <p>Self-realization and God-realization happen <em>together</em>. When you truly see what you are not — when the identification with the body and mind falls away — you simultaneously see what you truly are <em>and</em> you see the Lord. They are not two separate discoveries. They are one.</p>
        <p class="sub-heading">Text 34 — The Grace of the Lord</p>
        <p>When the illusory energy subsides — and this can only happen by the <em>grace of the Lord</em> — the living entity becomes enriched with knowledge and enlightened with self-realization. This is a critical point — the dissolution of illusion is not an achievement of the individual soul alone. It requires grace. It requires the Lord's <em>active participation</em> in our liberation.</p>
        <p class="sub-heading">Texts 35–37 — The Lord Beyond Comprehension</p>
        <p>The Lord's births and activities are undiscoverable even in the Vedic literatures. He is fully omnipotent, master of all senses, creator, maintainer and annihilator — and yet <em>least affected</em> by any of it. He is within every living being. Always independent. The foolish with a poor fund of knowledge cannot know the transcendental nature of the Lord's forms, names and activities. They see Him playing like an actor in a drama and mistake the performance for ordinary.</p>
        <p class="sub-heading">Text 38 — The Only Way to Know Him</p>
        <div class="quote-block"><p>Only those who render unreserved, uninterrupted, favorable service unto the lotus feet of Lord Kṛṣṇa can know the creator of the universe in His full glory, power and transcendence.</p></div>
        <p>Not scholars. Not meditators. Not ritualists. Only those who serve His lotus feet — <em>unreservedly</em>, <em>uninterruptedly</em>, <em>favorably</em> — can know Him fully. The path to knowing Bhagavān is bhakti. There is no other way.</p>
        <p class="sub-heading">Text 39 — The Guarantee</p>
        <p>For those who make sincere inquiry about the Lord, the guarantee is extraordinary — <strong>transcendental ecstatic love</strong> unto the Personality of Godhead and <strong>cent-percent immunity</strong> from the dreadful repetition of birth and death. This is the promise the Bhāgavatam makes. Not as a hope. As a fact.</p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Text 38 says only <em>unreserved, uninterrupted, favorable</em> service can give full knowledge of the Lord. Sit with the word <em>unreserved</em> for a moment. Is there any part of yourself that you have not yet offered — that you are still holding back from the Lord? Not with guilt — just with honest, gentle awareness.</p></div>
      `},
      { title: "The Glory of the Bhāgavatam", texts: "Texts 40–44", content: `
        <p>The chapter ends not with philosophy but with something deeply personal — a declaration of love for this scripture itself, and the answer to the <strong>sixth and final question</strong> the sages asked in Chapter 1.</p>
        <p class="sub-heading">Text 40 — The Literary Incarnation of God</p>
        <div class="quote-block"><p>This Śrīmad-Bhāgavatam is the literary incarnation of God, and it is compiled by Śrīla Vyāsadeva, the incarnation of God.</p></div>
        <p>We have just heard about twenty-two incarnations of the Lord in the universe. And now we are told — the Bhāgavatam itself is an incarnation. Not a book <em>about</em> the Lord. An actual <em>descent</em> of the Lord in the form of sound, of knowledge, of grace. Every page is sacred. Every verse is alive. To read this with devotion is to be in the presence of God Himself.</p>
        <p class="sub-heading">Texts 41–42 — The Sacred Chain</p>
        <p>Vyāsadeva extracted the cream of all Vedic literatures and delivered it to his son Śukadeva — the most respected among the self-realized. And Śukadeva in turn delivered it to Emperor Parīkṣit — sitting on the banks of the Ganges, surrounded by sages, awaiting death without food or drink. The greatest scripture was spoken to a man preparing to die. And received by him as the greatest gift. This is the <strong>paramparā</strong> — the sacred chain of transmission. Not just of information but of <em>realization</em>. Of love. Of living experience.</p>
        <p class="sub-heading">Text 43 — The Answer to Question 6</p>
        <p>Remember the sixth question the sages asked in Chapter 1 — <em>where did dharma, religion and knowledge go after Kṛṣṇa departed?</em> Here is the answer:</p>
        <div class="quote-block"><p>This Bhāgavata Purāṇa is as brilliant as the sun, and it has arisen just after the departure of Lord Kṛṣṇa to His own abode, accompanied by religion, knowledge, etc. Persons who have lost their vision due to the dense darkness of ignorance in the Age of Kali shall get light from this Purāṇa.</p></div>
        <p>When Kṛṣṇa left, He did not leave us in darkness. He left us this. The Bhāgavatam is the <em>sun of the age of Kali</em>. Religion, knowledge, devotion — all of it went into this book when the Lord departed. To read it is to be in His company. To hear it is to receive His grace. <strong>The Lord never truly left. He simply changed His form.</strong></p>
        <p class="sub-heading">Text 44 — Sūta Gosvāmī's Personal Declaration</p>
        <p>The chapter ends with something deeply touching. Sūta Gosvāmī speaks in the first person — not what I memorized, not what I studied, but <em>as I have realized it</em>. This is the spirit in which the Bhāgavatam is meant to be transmitted — not as information transferred from one mind to another, but as realization flowing from one heart to another.</p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Text 43 says the Bhāgavatam arose as a sun when Kṛṣṇa departed — carrying within it all of religion, all of knowledge, all of devotion. You are reading this Bhāgavatam right now. In this very study. Does it feel like sunlight entering a dark room — even a little? Even faintly? That feeling — however subtle — is the Bhāgavatam doing exactly what it promised.</p></div>
      `}
    ]

    sections: [
      { title: "The Sages Ask New Questions", texts: "Texts 1–13", content: `
        <p>We are still in Naimiṣāraṇya. Chapters 1, 2 and 3 were Sūta Gosvāmī answering the six questions of the sages. Now something shifts. The sages have heard the answers — and rather than being satisfied, they are <em>more</em> hungry. More curious. More eager. This is the nature of Kṛṣṇa-kathā — it does not quench thirst, it deepens it.</p>
        <p>Śaunaka Muni — the elderly, learned leader of all the ṛṣis — rises and addresses Sūta Gosvāmī with deep appreciation. He calls him the most fortunate and respected of all who can speak and recite. And then he asks a whole new set of questions — not about the philosophy this time, but about the <em>history</em> of the Bhāgavatam itself. How did this great scripture come to be? Where did Vyāsadeva get his inspiration? And who are these extraordinary personalities — Śukadeva Gosvāmī and Mahārāja Parīkṣit — through whom it was transmitted?</p>
        <p class="sub-heading">Text 3 — Where did the Bhāgavatam begin?</p>
        <p>The sages ask three things — in what period, at what place, and why was the Bhāgavatam first begun? And what inspired Vyāsadeva to compile it? Behind every great scripture there is a great story. The sages want to know that story.</p>
        <p class="sub-heading">Texts 4–5 — Who is Śukadeva Gosvāmī?</p>
        <p>Here we get our first close look at the extraordinary being who will narrate the entire Bhāgavatam — Śukadeva Gosvāmī, the son of Vyāsadeva. He was a great devotee — an equibalanced monist — whose mind was always concentrated in pure awareness. He was so absorbed in the divine that he appeared to the outside world like an ignorant person. Completely unexposed — walking through life like a madman, dumb and retarded to those who could not see what he truly was.</p>
        <p>And then Text 5 gives us one of the most stunning and delicate images in the entire Bhāgavatam. When Śukadeva passed by a pool where beautiful young women were bathing, they did not cover themselves. But when his father Vyāsadeva followed behind, they immediately covered themselves. The ladies replied — <em>your son looks at us with the same pure vision with which he sees everything. He makes no distinction between male and female. But you still make such distinctions.</em></p>
        <p>Śukadeva was so completely absorbed in the self that the distinctions the material world makes simply did not register. He saw only the pure soul everywhere. This is not indifference. This is the deepest form of respect — seeing the divine in every being without exception.</p>
        <p class="sub-heading">Texts 6–8 — How was Śukadeva recognized?</p>
        <p>Text 8 gives us a beautiful detail — Śukadeva Gosvāmī was accustomed to staying at the door of a householder only <em>as long as it takes to milk a cow</em>. Such a brief visit. And he did this not for food or rest — but simply to <strong>sanctify the residence</strong>. The pure devotee purifies every place he enters, simply by his presence, even for a few moments.</p>
        <p class="sub-heading">Texts 9–12 — Who is Mahārāja Parīkṣit?</p>
        <p>The sages ask about the emperor who sat on the banks of the Ganges to fast until death and received the Bhāgavatam. He was a great emperor — possessing all opulences, increasing the prestige of the entire Pāṇḍu dynasty. Even his enemies would bow down at his feet. Why would such a man give everything up?</p>
        <p>And then Text 12 asks the most moving question of all — <em>those who are devoted to the cause of the Personality of Godhead live only for the welfare, development and happiness of others. So even though Parīkṣit was free from attachment, how could he give up his mortal body, which was the shelter for others?</em> They are not asking why he died. They are asking — how could a man whose very existence was a shelter for others bear to leave? The devotee's life is not his own. It belongs to those he serves.</p>
        <p class="sub-heading">Text 13 — The Sages' Confidence</p>
        <p>The sages conclude with a beautiful expression of faith — <em>we know that you are expert in the meaning of all subjects, and thus you can clearly explain the answers.</em> They are not demanding. They are trusting. And this trust itself creates the atmosphere in which knowledge can flow.</p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>The ladies at the pool said Śukadeva looked at them without making any distinction — he saw only the pure soul. Is there anyone in your life whom you find it difficult to see as a pure soul — beyond their gender, their role, their history? What would it mean to even glimpse them the way Śukadeva saw?</p></div>
      `},
      { title: "Vyāsadeva Divides the Vedas", texts: "Texts 14–25", content: `
        <p>Sūta Gosvāmī now begins to answer. And he starts not with Parīkṣit or Śukadeva — but much earlier. He goes back to the very source — to Vyāsadeva himself, and the story of why the Bhāgavatam was written at all.</p>
        <p class="sub-heading">Text 14 — The Birth of Vyāsadeva</p>
        <p>Vyāsadeva was born at the overlap of the second and third millenniums — the junction between Dvāpara and Kali-yuga. His very birth was at a turning point in cosmic time — as if the universe itself arranged for this extraordinary soul to appear precisely when he would be most needed.</p>
        <p class="sub-heading">Text 15 — The Morning Meditation</p>
        <p>One morning, after his ablutions in the waters of the Sarasvatī river, Vyāsadeva sat alone to concentrate. This simple detail — <em>he sat alone to concentrate</em> — is the beginning of everything. All great knowledge begins with stillness. With the willingness to sit quietly and look deeply at what is true.</p>
        <p class="sub-heading">Texts 16–18 — Seeing the Darkness Ahead</p>
        <p>Through his transcendental vision, Vyāsadeva saw the deterioration ahead — that the people of Kali-yuga would be reduced in their duration of life, would be impatient and would lack goodness. But notice — his response is not despair or anger. It is <em>contemplation for the welfare of men in all statuses and orders of life.</em> He sees darkness coming and immediately asks — what can I do? How can I help? This is the mood of a true teacher. A true servant of humanity.</p>
        <p class="sub-heading">Text 19 — Dividing the One Veda</p>
        <p>To make the Vedic knowledge accessible to the people of Kali-yuga, he divided the one original Veda into four. Not to diminish the Vedas. But out of compassion — to bring the light closer to those whose eyes were growing weaker.</p>
        <p class="sub-heading">Text 20 — The Fifth Veda</p>
        <p>And the historical facts and authentic stories — the Purāṇas — he made into a separate fifth Veda. This is a profound statement. <strong>Stories are not entertainment. They are Veda.</strong> They carry the same sacred knowledge as the mantras — but in a form the heart can receive directly, without years of scholarly training.</p>
        <p class="sub-heading">Texts 21–23 — The Great Professors</p>
        <p>Different sages were entrusted with different Vedas — Paila Ṛṣi with the Ṛg Veda, Jaimini with the Sāma Veda, Vaiśampāyana with the Yajur Veda, Sumantu Muni with the Atharva Veda, and Sūta Gosvāmī's own father Romaharṣaṇa with the Purāṇas. Each in turn taught their disciples, who taught theirs — and so the great river of Vedic knowledge branched out into countless streams.</p>
        <p class="sub-heading">Texts 24–25 — The Mahābhārata</p>
        <p>Out of compassion for those who could not access the complex Vedic knowledge — women, laborers, and others — Vyāsadeva compiled the great historical narration called the Mahābhārata. His motive is stated clearly — <em>he thought it wise that this would enable men to achieve the ultimate goal of life.</em> Every great work of Vyāsadeva flows from this one spring — <strong>compassion</strong>. The desire for every human being to reach the highest.</p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Vyāsadeva divided and simplified the Vedas not because the knowledge was less important — but because the people needed it more accessible. He met humanity where they were. Is there knowledge or wisdom you carry that you have perhaps kept too complex or too private — that could be simplified and offered more freely to those around you?</p></div>
      `},
      { title: "Vyāsadeva's Dissatisfaction", texts: "Texts 26–31", content: `
        <p>Now we come to the heart of this chapter — and one of the most psychologically profound passages in the entire Bhāgavatam. Vyāsadeva has done everything right. He has compiled the Vedas. He has written the Mahābhārata. He has worked tirelessly for the welfare of all humanity. And yet — something is wrong.</p>
        <p class="sub-heading">Text 26 — The Inexplicable Emptiness</p>
        <div class="quote-block"><p>Still his mind was not satisfied, although he engaged himself in working for the total welfare of all people.</p></div>
        <p>Just sit with this for a moment. Here is the greatest literary genius in the history of the universe. He has produced works that will guide millions of souls across millennia. And he is not satisfied. His heart is empty. This is not false modesty. This is a real and honest crisis. And it is deeply relatable — how many of us have achieved things we worked hard for, helped others, been productive and useful — and still felt that something essential was missing?</p>
        <p class="sub-heading">Text 27 — He Reflects on the Cause</p>
        <p>Because Vyāsadeva knew the essence of religion, he immediately turned inward. He did not distract himself or produce more works. He <em>sat and reflected</em>. He looked honestly at what was wrong. This capacity for honest self-reflection — even for the greatest sage — is itself a form of spiritual practice.</p>
        <p class="sub-heading">Texts 28–30 — Taking Stock</p>
        <p>Vyāsadeva reviews what he has done — strict disciplinary vows, worship of the Vedas and spiritual masters, the Mahābhārata. All of it was done properly. All of it was for others. And yet —</p>
        <div class="quote-block"><p>I am feeling incomplete, though I myself am fully equipped with everything required by the Vedas.</p></div>
        <p>This is the confession of a soul who has done everything externally correct and still feels internally hollow. This feeling — this <em>sacred dissatisfaction</em> — is one of the most important experiences on the spiritual path. It is the soul's way of saying — you have not yet given me what I truly need.</p>
        <p class="sub-heading">Text 31 — The Clue</p>
        <div class="quote-block"><p>This may be because I did not specifically point out the devotional service of the Lord, which is dear both to perfect beings and to the infallible Lord.</p></div>
        <p>This is the moment of realization. All his vast work was wonderful. But he had not yet directly, specifically, abundantly described the <em>devotional loving service to Kṛṣṇa</em>. He had given people the path but not the destination in its full sweetness. He had given them the map but not the love that makes the journey worth taking. <strong>The Bhāgavatam was born from this moment of sacred emptiness.</strong></p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Vyāsadeva had done everything right — and still felt incomplete. He realized the missing ingredient was not more knowledge or more effort, but the direct glorification of the Lord's devotional service. Have you ever experienced that kind of sacred dissatisfaction — where everything looks good from the outside but something inside feels unfulfilled? What does your heart tell you is the missing ingredient?</p></div>
      `},
      { title: "Nārada Arrives", texts: "Texts 32–33", content: `
        <p>The chapter ends with two verses that feel like the sunrise after a long night.</p>
        <p class="sub-heading">Text 32 — Perfect Timing</p>
        <div class="quote-block"><p>Nārada reached the cottage of Kṛṣṇa-dvaipāyana Vyāsa on the banks of the Sarasvatī just as Vyāsadeva was regretting his defects.</p></div>
        <p>The words <em>just as</em> are everything here. Not before. Not after. But <em>exactly</em> when Vyāsadeva had reached the depths of his honest self-examination. This is how the Lord works through His devotees — He sends the right teacher at exactly the right moment. When the student is truly ready — truly empty, truly honest — the teacher appears.</p>
        <p>Nārada did not arrive when Vyāsadeva was busy and satisfied. He arrived when Vyāsadeva was sitting quietly with his incompleteness. <em>The divine always enters through the open wound, not through the armoured fortress.</em></p>
        <p class="sub-heading">Text 33 — The Reception</p>
        <p>Śrī Vyāsadeva got up respectfully and worshiped him, giving him veneration equal to that given to Brahmājī, the creator. Even the greatest sage in the world rises and bows when the devotee of the Lord arrives. Nārada carries something Vyāsadeva does not yet have in full measure — the direct, living, personal experience of <em>devotional love for Kṛṣṇa</em>. And Vyāsadeva knows it. So he bows. This is the paramparā in its most human and beautiful form — one great soul recognizing what another great soul carries, and humbling himself to receive it.</p>
        <div class="sit-with-this"><div class="sit-title">🪷 Sit With This</div><p>Nārada arrived <em>just as</em> Vyāsadeva was sitting with his incompleteness and regret. The teacher came not when Vyāsadeva was busy and productive — but when he was still, honest and empty. In your own life — are you giving yourself enough of those quiet, honest moments of sitting with incompleteness? Or are you always too busy producing, achieving, moving? The divine enters through stillness.</p></div>
      `}

function renderHome() {
  document.getElementById('chapterGrid').innerHTML = chapters.map(ch => `
    <div class="chapter-item ${ch.available ? 'available' : 'coming-soon'}"
         ${ch.available ? `onclick="openChapter(${ch.num-1})"` : ''}>
      <div class="chapter-num-col">${ch.num}</div>
      <div class="chapter-body">
        <div>
          <div class="chapter-title-text">${ch.title}</div>
          <div class="chapter-meta">${ch.available ? ch.sections.length+' sections' : 'Coming soon'}</div>
        </div>
        ${ch.available ? '<div class="chapter-arrow">›</div>' : ''}
      </div>
    </div>
  `).join('');
}

function openChapter(idx) {
  const ch = chapters[idx];
  document.getElementById('chapterNum').textContent = `Canto 1 · Chapter ${ch.num}`;
  document.getElementById('chapterTitle').textContent = ch.title;
  document.getElementById('breadcrumb-chapter').textContent = `Chapter ${ch.num}`;
  document.getElementById('sectionsContainer').innerHTML = ch.sections.map((sec, i) => `
    <div class="section-block" id="sec-${i}">
      <div class="section-header" onclick="toggleSection(${i})">
        <div class="section-header-left">
          <div class="section-num">Section ${i+1}</div>
          <div class="section-name">${sec.title}</div>
          <div class="section-texts">${sec.texts}</div>
        </div>
        <div class="section-chevron">▾</div>
      </div>
      <div class="section-body">${sec.content}</div>
    </div>
  `).join('');
  showScreen('chapter');
  window.scrollTo(0,0);
}

function toggleSection(idx) {
  const block = document.getElementById(`sec-${idx}`);
  const isOpen = block.classList.contains('open');
  document.querySelectorAll('.section-block').forEach(b => b.classList.remove('open'));
  if (!isOpen) {
    block.classList.add('open');
    setTimeout(() => block.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  showScreen('home');
  window.scrollTo(0,0);
}

renderHome();
