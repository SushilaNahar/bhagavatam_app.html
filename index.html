        <div class="sit-with-this"><div class="sit-title">&#127 Sit With This</div><p>Narada walked through the most beautiful and most terrifying places in the world &mdash; and was moved by none of them. He was not suppressing his feelings. He was simply free. The beauty did not snag him. The terror did not stop him. Is there anything in your life right now &mdash; beautiful or frightening &mdash; that has snagged your attention so completely that you cannot move freely? Not with judgment &mdash; just with honest observation.</p></div>
      `},
      { title: "The Vision of Krsna", texts: "Texts 16&ndash;20", content: `
        <p>This is the heart of the chapter &mdash; and one of the most extraordinary passages in the entire Bhagavatam.</p>
        <p class="sub-heading">Text 16 &mdash; The Appearance</p>
        <div class="quote-block"><p>As soon as I began to meditate upon the lotus feet of the Personality of Godhead with my mind transformed in transcendental love, tears rolled down my eyes, and without delay the Personality of Godhead, Sri Krsna, appeared on the lotus of my heart.</p></div>
        <p>Read that again slowly. <em>As soon as. Without delay.</em> Not after years of meditation. Not after lifetimes of austerity. As soon as the mind was transformed in transcendental love &mdash; Krsna appeared. Instantly. This is the confirmation of everything Chapter 3 told us &mdash; that God is not seen through the sharpness of the intellect but through the purity of love. The moment love became the medium of meditation &mdash; the Lord was there.</p>
        <p class="sub-heading">Text 17 &mdash; The Ocean of Ecstasy</p>
        <p>Every part of my body became separately enlivened. And then &mdash; <em>being absorbed in an ocean of ecstasy, I could not see both myself and the Lord.</em> The ecstasy was so total &mdash; that the normal subject-object distinction collapsed. There was no longer a Narada who was seeing Krsna. There was simply seeing. Simply being. The boundary between the devotee and the Lord dissolved in the flood of love. This is the highest experience &mdash; the <em>personal</em> merging of bhakti &mdash; where the lover and the beloved are so flooded with love that distinctions temporarily dissolve, and yet both remain themselves.</p>
        <p class="sub-heading">Text 18 &mdash; The Loss</p>
        <p>And then &mdash; the form was gone. The vision passed. And Narada &mdash; who had just been in an ocean of ecstasy &mdash; suddenly found himself back in an ordinary forest, under an ordinary banyan tree. And the loss was unbearable. Because he had known something real. And now it was gone.</p>
        <p class="sub-heading">Text 19 &mdash; The Desperate Search</p>
        <p>He tried to find it again. He concentrated, tried to recreate the conditions &mdash; and found nothing. This is so honestly human. The mystic experience comes. And then it goes. No amount of effort can bring it back by force. But notice what Narada does not do. He does not conclude that it was an illusion. He does not give up. He simply sits with the grief &mdash; honestly, completely &mdash; in the place where he last experienced the Lord.</p>
        <p class="sub-heading">Text 20 &mdash; The Lord Speaks</p>
        <p><em>Seeing my attempts in that lonely place, the Personality of Godhead spoke to me with gravity and pleasing words, just to mitigate my grief.</em> The Lord saw him. Not from a distance. From within. He was watching Narada's desperate search &mdash; and He was moved. And He spoke.</p>
        <div class="sit-with-this"><div class="sit-title">&#127 Sit With This</div><p>Narada had the most extraordinary spiritual experience of his life &mdash; and then it was taken away. And he sat in the grief of that loss honestly, without pretending it was fine, without giving up. Have you ever had a period of spiritual dryness &mdash; a time when what was once alive in your practice felt suddenly absent? How did you respond to that dryness? Did you push harder? Give up? Or were you able to simply sit with it, like Narada under the banyan tree?</p></div>
      `},
      { title: "The Lord Speaks to Narada", texts: "Texts 21&ndash;25", content: `
        <p>This is one of the most intimate moments in all of scripture &mdash; the Lord speaking directly to a grieving soul in a lonely forest. Not in a grand assembly. Not from a cosmic throne. From within &mdash; in gravity and pleasing words &mdash; just to mitigate his grief.</p>
        <p class="sub-heading">Text 21 &mdash; The Hard Truth</p>
        <div class="quote-block"><p>I regret that during this lifetime you will not be able to see Me anymore. Those who are incomplete in service and who are not completely free from all material taints can hardly see Me.</p></div>
        <p>This could feel crushing. But it is not meant cruelly. The Lord is explaining, not punishing. And notice &mdash; the Lord says <em>I regret.</em> He does not say you have failed. He says &mdash; <strong>I regret.</strong> There is divine sorrow in this separation. The Lord misses His devotee as much as the devotee misses the Lord.</p>
        <p class="sub-heading">Text 22 &mdash; Why the Vision Was Given and Then Withdrawn</p>
        <div class="quote-block"><p>You have only once seen My person, and this is just to increase your desire for Me, because the more you hanker for Me, the more you will be freed from all material desires.</p></div>
        <p>The Lord appeared &mdash; and then disappeared &mdash; deliberately. Not to tease but to deepen. Because a soul that has glimpsed the Lord and lost the vision will burn with longing. And that longing &mdash; that holy hunger &mdash; burns away material desire faster than any austerity. <em>The absence of the Lord, when it comes after a genuine meeting, is itself a form of grace.</em> It creates a vacuum that only Krsna can fill.</p>
        <p class="sub-heading">Text 23 &mdash; The Promise</p>
        <div class="quote-block"><p>By service of the Absolute Truth, even for a few days, a devotee attains firm and fixed intelligence in Me. Consequently he goes on to become My associate in the transcendental world.</p></div>
        <p><em>Even for a few days.</em> Narada had only two seasons with the sages. A few months. And yet that was enough &mdash; in combination with sincerity, humility and complete surrender. The Lord does not measure by time. <strong>He measures by the quality of the love.</strong></p>
        <p class="sub-heading">Text 24 &mdash; The Eternal Memory</p>
        <div class="quote-block"><p>Intelligence engaged in My devotion cannot be thwarted at any time. Even at the time of creation, as well as at the time of annihilation, your remembrance will continue by My mercy.</p></div>
        <p>Here is the answer to Vyasadeva's question from Text 4 &mdash; how does transcendental memory survive the annihilation of time? Because it is held not in the material brain but in the Lord's own mercy. <strong>What the Lord touches with His grace cannot be erased &mdash; not by time, not by death, not by the dissolution of universes.</strong></p>
        <p class="sub-heading">Text 25 &mdash; Silence</p>
        <p>The Lord spoke &mdash; and then fell silent. And Narada bowed. Not in defeat. In gratitude. The conversation was complete. The grief had been addressed. The promise had been given. And now there was nothing left to do but bow.</p>
        <div class="sit-with-this"><div class="sit-title">&#127 Sit With This</div><p>The Lord tells Narada &mdash; I withdrew My vision to increase your desire for Me. Because the more you hanker for Me, the more you will be freed from all material desires. Has the longing for something sacred &mdash; even when it felt like loss &mdash; ever purified you? Have you ever found that the ache of spiritual hunger did more for your inner life than periods of satisfaction and comfort?</p></div>
      `},
      { title: "Liberation and the New Body", texts: "Texts 26&ndash;38", content: `
        <p>The conversation with the Lord is over. And now Narada simply lives. He takes what he has been given and does with it the only natural thing &mdash; he chants.</p>
        <p class="sub-heading">Text 26 &mdash; The Chanting Life</p>
        <div class="quote-block"><p>Thus I began chanting the holy name and fame of the Lord by repeated recitation, ignoring all the formalities of the material world. So doing, I traveled all over the earth, fully satisfied, humble and unenvious.</p></div>
        <p>Three words that define the liberated life &mdash; <em>fully satisfied, humble and unenvious.</em> Not achieving. Not accumulating. Not competing. Traveling. Chanting. Satisfied. Humble. Unenvious. This is the portrait of a free soul. Not someone who has everything. Someone who <strong>needs nothing</strong> &mdash; who has found the one thing that satisfies completely and simply gives himself to it.</p>
        <p class="sub-heading">Text 27 &mdash; Death Without Fear</p>
        <p>Death came &mdash; <em>as lightning and illumination occur simultaneously.</em> Not as a slow deterioration, not as a fearful ending &mdash; but as a flash of light. Because for a person with no attachments, no material taints, no fear &mdash; death is not a wall. <strong>It is a door.</strong></p>
        <p class="sub-heading">Texts 28&ndash;30 &mdash; The New Body and the Cosmic Cycle</p>
        <p>Having been awarded a transcendental body befitting an associate of the Personality of Godhead, Narada quit the body made of five material elements &mdash; and all karma stopped. The account was closed. At the end of the cosmic millennium Narada entered into the Lord along with Brahma. And 4,300,000,000 solar years later &mdash; when Brahma awoke to create again &mdash; Narada appeared from the transcendental body of the Lord. He has been doing this across unimaginable cycles of cosmic time. Entering and emerging. Each time with the same devotion, the same vina, the same mission.</p>
        <p class="sub-heading">Texts 31&ndash;34 &mdash; The Eternal Wandering</p>
        <p>Since then Narada travels everywhere without restriction, fixed in unbroken devotional service, constantly singing. And Text 33 gives us one of the most beautiful statements in the chapter:</p>
        <div class="quote-block"><p>The Supreme Lord Sri Krsna, whose glories and activities are pleasing to hear, at once appears on the seat of my heart, as if called for, as soon as I begin to chant His holy activities.</p></div>
        <p>What Narada could not sustain through sitting meditation as a young boy &mdash; he now has permanently. Every time he chants &mdash; Krsna appears. Not occasionally. Not when the conditions are perfect. <em>Every time. As if the Lord has been waiting for exactly this sound to come home to.</em></p>
        <p class="sub-heading">Texts 35&ndash;38 &mdash; The Final Words and Departure</p>
        <p>For those who are anxious and full of material desire, the constant chanting of the Lord's activities is the most suitable boat to cross the ocean of nescience. Even yoga and sense restraint cannot give the complete satisfaction that devotional service gives. Because yoga addresses the symptoms. Only bhakti addresses the root &mdash; the longing of the soul for its source.</p>
        <p>Narada rises, vibrates his vina, and departs &mdash; to wander at his free will. Suta Gosvami closes with a benediction &mdash; <em>all glory and success to Srila Narada Muni because he glorifies the activities of the Personality of Godhead, and so doing he himself takes pleasure and also enlivens all the distressed souls of the universe.</em> The greatest among the sages &mdash; is a musician. Who walks. And sings. And asks nothing in return.</p>
        <div class="sit-with-this"><div class="sit-title">&#127 Sit With This</div><p>Text 33 says &mdash; as soon as Narada begins to chant the Lord's activities, Krsna appears on the seat of his heart, as if called for. Not after years of effort. As soon as the chanting begins. Is there a practice in your life &mdash; a name, a prayer, a song, a verse &mdash; that when you return to it, even after long absence, something in you quietly comes alive again? That is your vina. That is your Narada-gift. The Lord has given every devotee their own instrument. The question is only &mdash; how often do you play it?</p></div>
      `}
    ]
  },
  {
    num: 7, title: "The Son of Drona Punished", available: true,
    sections: [
      { title: "Vyasadeva's Vision and the Bhagavatam is Taught", texts: "Texts 1&ndash;11", content: `
        <p>The chapter opens with a question from Saunaka Rsi &mdash; after Narada departed, what did Vyasadeva do? This bridges us from the intimate philosophical conversations of Chapters 5 and 6 back to the unfolding of the story.</p>
        <p class="sub-heading">Texts 2&ndash;3 &mdash; The Ashrama on the Sarasvati</p>
        <p>On the western bank of the Sarasvati river &mdash; the river intimately connected with the Vedas &mdash; there was a cottage for meditation at Shamyaprasa. And there, surrounded by berry trees, Vyasadeva sat in his own ashrama, touched water for purification, and sat down to meditate. The greatest literary genius in the universe &mdash; sitting in a forest cottage surrounded by berry trees and stillness. No grand ceremony. Just a man, a cottage, a river and silence.</p>
        <p class="sub-heading">Text 4 &mdash; The Vision</p>
        <div class="quote-block"><p>Thus he fixed his mind, perfectly engaging it by linking it in devotional service &mdash; bhakti-yoga &mdash; without any tinge of materialism, and thus he saw the Absolute Personality of Godhead along with His external energy, which was under full control.</p></div>
        <p>This is the fruit of everything Narada taught him. The diagnosis has been received. The prescription has been understood. And now Vyasadeva acts on it &mdash; not by writing immediately, but by first sitting and <em>seeing</em>. He links his mind in bhakti-yoga and the Lord becomes visible. He sees the personal Lord <em>and</em> the material world as His controlled energy. Both together. The full reality.</p>
        <p class="sub-heading">Texts 5&ndash;6 &mdash; Why the Living Entity Suffers</p>
        <p>The living entity is transcendental &mdash; by nature beyond the three modes of material nature. But due to the external energy, he <em>thinks of himself as a material product</em> and undergoes the reactions of material miseries. This is the core diagnosis of the entire Bhagavatam. You are not the body. You are not the mind. You are the pure spiritual self. But you have forgotten this. And in that forgetting &mdash; in that misidentification &mdash; all suffering arises. And the remedy? Bhakti-yoga. <strong>Directly.</strong></p>
        <p class="sub-heading">Text 7 &mdash; The Power of the Bhagavatam</p>
        <div class="quote-block"><p>Simply by giving aural reception to this Vedic literature, the feeling for loving devotional service to Lord Krsna sprouts up at once to extinguish the fire of lamentation, illusion and fearfulness.</p></div>
        <p>Three fires &mdash; lamentation, illusion and fearfulness. Regret for the past. Confusion about the present. Anxiety about the future. Simply by <em>hearing</em> this literature &mdash; not studying it intellectually, not memorizing it &mdash; these three fires are extinguished.</p>
        <p class="sub-heading">Texts 8&ndash;11 &mdash; Why Would a Liberated Soul Study the Bhagavatam?</p>
        <p>Vyasadeva compiled the Bhagavatam and taught it to his son Sukadeva Gosvami &mdash; who was already self-realized. Saunaka asks &mdash; why would a liberated soul take the trouble to study this? And Suta Gosvami's answer is the famous Atmarama verse:</p>
        <div class="quote-block"><p>All different varieties of atmaramas &mdash; those who take pleasure in the spirit self &mdash; though freed from all kinds of material bondage, desire to render unalloyed devotional service unto the Personality of Godhead. This means that the Lord possesses transcendental qualities and therefore can attract everyone &mdash; including liberated souls.</p></div>
        <p>Even those who have achieved liberation are drawn back to Krsna. Not because they still have material desires. But because Krsna is so beautiful that even freedom cannot satisfy the soul as deeply as love for Him. <strong>Liberation is not the highest destination. Love is.</strong></p>
        <div class="sit-with-this"><div class="sit-title">&#127 Sit With This</div><p>Text 10 says that even liberated souls &mdash; those completely free from all material bondage &mdash; desire to render devotional service to the Lord. Liberation is not enough. The soul wants to <em>love</em>. Have you ever noticed that even in moments of great peace, great contentment, even moments of feeling genuinely free &mdash; there is still a pull toward something more? Not more pleasure, not more achievement &mdash; but more <em>love</em>? That pull is what this verse is describing.</p></div>
      `},
      { title: "The Story Begins &mdash; Asvatthama's Crime", texts: "Texts 12&ndash;21", content: `
        <p>And now the narrative begins. We are dropped straight into the aftermath of the Kurukshetra war &mdash; fire, grief, betrayal and the most terrible act of the chapter.</p>
        <p class="sub-heading">Texts 13&ndash;14 &mdash; The Heinous Act</p>
        <p>The war is over. Duryodhana lies dying, his spine shattered by Bhima's club. And at this moment &mdash; in the darkness, with everything lost &mdash; Asvatthama enters the Pandava camp at night, finds the five sleeping sons of Draupadi and beheads them. He brings the heads to the dying Duryodhana as a trophy, thinking to please his master.</p>
        <p>But even Duryodhana &mdash; who had fought the Pandavas his entire life &mdash; was horrified. He disapproved of the heinous act and was not pleased in the least. This detail is quietly devastating. <em>Even the enemy of the Pandavas recognized that killing sleeping children was monstrous.</em> There are lines that dharma draws even in the midst of war. And Asvatthama had crossed every one of them.</p>
        <p class="sub-heading">Texts 15&ndash;17 &mdash; Draupadi's Grief and Arjuna's Promise</p>
        <p>Draupadi began to cry in distress with eyes full of tears. Arjuna, trying to pacify her, made a promise &mdash; I will bring you the head of that brahmana. He was giving the only comfort warrior tradition knew how to give &mdash; the promise of justice. And having made it, he armed himself and went in pursuit.</p>
        <p class="sub-heading">Texts 18&ndash;21 &mdash; The Brahmastra</p>
        <p>Asvatthama, seeing Arjuna coming in pursuit, fled in panic. And when he realized there was no escape, he invoked the brahmastra &mdash; the nuclear weapon of the ancient world. But with one terrible difference: <strong>he did not know how to withdraw such weapons.</strong> He released a weapon he could not recall. Out of fear. Without the knowledge or the right to use it responsibly. And a glaring light spread in all directions so fierce that even Arjuna thought his own life was in danger.</p>
        <div class="sit-with-this"><div class="sit-title">&#127 Sit With This</div><p>Asvatthama released a weapon he could not recall &mdash; out of panic, without knowledge, without responsibility for the consequences. Power without wisdom. Action without understanding. Fear driving decisions that affect everyone. Is there anything in your own life &mdash; an action taken in panic, a word spoken in fear &mdash; that once released could not be taken back? What does this story say about the relationship between fear and the harm we cause?</p></div>
      `},
      { title: "Arjuna's Prayers and Krsna's Guidance", texts: "Texts 22&ndash;32", content: `
        <p>Faced with the blinding light of the brahmastra, Arjuna turns immediately to Krsna. And what follows is one of the most beautiful expressions of surrender in the entire Bhagavatam.</p>
        <p class="sub-heading">Texts 22&ndash;25 &mdash; Arjuna's Prayer</p>
        <p>Arjuna's prayer is not a request for a military solution. It begins with recognition &mdash; <em>O my Lord Sri Krsna, You are the almighty Personality of Godhead. There is no limit to Your different energies. Therefore only You are competent to instill fearlessness in the hearts of Your devotees. Everyone in the flames of material miseries can find the path of liberation in You only.</em></p>
        <p>In the middle of a battlefield emergency &mdash; with a nuclear weapon blazing in all directions &mdash; Arjuna stops to recognize who Krsna is. Not just his charioteer. Not just his friend. The original Personality of Godhead who descends to remove the burden of the world. <em>This is what it means to have Krsna as your charioteer. In every moment of crisis &mdash; the first instinct is not strategy. It is surrender. It is recognition. It is love.</em></p>
        <p class="sub-heading">Texts 27&ndash;32 &mdash; Krsna's Guidance and Arjuna's Mercy</p>
        <p>Krsna explains calmly what has happened and gives the solution. Arjuna counteracts with his own brahmastra. The two weapons meet &mdash; and for a moment the universe itself is threatened. The combined heat scorched all three worlds. And then &mdash; Arjuna retracted both weapons. As Lord Sri Krsna desired. Not because he could not fight. Because the Lord's desire was for mercy and for the world to continue. And Arjuna, fully surrendered, acted in alignment with that desire.</p>
        <div class="sit-with-this"><div class="sit-title">&#127 Sit With This</div><p>In the middle of a crisis &mdash; with a weapon blazing in all directions &mdash; Arjuna's first instinct was to turn to Krsna and recognize who He was. Not to strategize first. To surrender first. When you are in crisis &mdash; when something is blazing in your life and threatening everything &mdash; what is your first instinct? To fix it? To run? To fight? Or to turn, first, to something larger than yourself?</p></div>
      `},
      { title: "The Debate &mdash; Should Asvatthama be Killed?", texts: "Texts 33&ndash;52", content: `
        <p>Arjuna captures Asvatthama and brings him bound like an animal to Draupadi. And now one of the most extraordinary moral debates in the Bhagavatam unfolds.</p>
        <p class="sub-heading">Texts 42&ndash;48 &mdash; Draupadi's Mercy</p>
        <p>The woman whose sons were murdered. The woman who wept with eyes full of tears. When Draupadi sees Asvatthama &mdash; bound, humiliated, defeated &mdash; she shows him <em>due respects as a brahmana.</em> She says &mdash; release him. He is a brahmana. Our spiritual master. She reminds Arjuna that it was by Dronacharya's mercy that he learned the art of warfare. She says &mdash; do not make Dronacharya's wife cry as I am crying. She need not lose her son too.</p>
        <p>This is one of the most breathtaking moments in the Bhagavatam. <strong>The victim pleading for mercy for her oppressor.</strong> The grieving mother protecting the man who killed her children &mdash; not from weakness, not from indifference &mdash; but from a greatness of soul that transcends personal suffering.</p>
        <p class="sub-heading">Texts 49&ndash;51 &mdash; The Assembly Divided</p>
        <p>Yudhisthira fully supported Draupadi's words. Nakula, Sahadeva, Satyaki, Arjuna, Krsna, the ladies &mdash; all agreed. But Bhima disagreed angrily &mdash; recommending killing this culprit who had murdered sleeping children. Bhima was not wrong in his outrage. He was simply operating from a different principle &mdash; pure justice, without the modulation of mercy.</p>
        <p class="sub-heading">Text 52 &mdash; Krsna Smiles</p>
        <p>After hearing the words of Bhima and Draupadi and all the others &mdash; Krsna looked at His dear friend Arjuna's face. And He began to speak <em>as if smiling.</em> The Lord holding the entire complexity of dharma &mdash; justice and mercy, promise and principle, brahmana honor and warrior duty &mdash; and smiling. Because He knows how to hold it all. Because He is never flustered by complexity. He simply &mdash; <strong>smiles.</strong></p>
        <div class="sit-with-this"><div class="sit-title">&#127 Sit With This</div><p>Draupadi &mdash; the woman whose sons were killed &mdash; pleaded for the life of their killer. Not from weakness but from a greatness of soul that recognized something larger than her own grief. Is there any situation in your life where you are holding on to a justified grievance &mdash; where the anger is real, the hurt is real, the wrong was real &mdash; but where your own deepest nature is quietly asking you to find a response larger than the injury?</p></div>
      `},
      { title: "Krsna's Verdict and the Punishment", texts: "Texts 53&ndash;58", content: `
        <p class="sub-heading">Texts 53&ndash;54 &mdash; Krsna's Brilliant Solution</p>
        <div class="quote-block"><p>A friend of a brahmana is not to be killed. But if he is an aggressor he must be killed. All these rulings are in the scriptures. You have to fulfill your promise to your wife, and you must also act to the satisfaction of Bhimasena and Me.</p></div>
        <p>In one statement Krsna holds every competing obligation simultaneously. Arjuna's promise to Draupadi. The scriptural prohibition against killing a brahmana. Bhima's demand for justice. The Lord's own will. All of it &mdash; held together. The solution that satisfies all of them is implied but not stated. And a true friend understands.</p>
        <p class="sub-heading">Text 55 &mdash; Arjuna Understands</p>
        <p><em>Just then Arjuna could understand the motive of the Lord by His equivocal orders.</em> Not through analysis. Through intimacy. Through the kind of understanding that only comes in a deep friendship where one person can read the other's meaning beyond the words. Arjuna understood &mdash; and with his sword, he severed both hair and the jewel from Asvatthama's head.</p>
        <p class="sub-heading">Texts 56&ndash;57 &mdash; The Punishment</p>
        <p>The cutting of hair, the removal of his jewel &mdash; the source of his power &mdash; and being driven out of the camp. Not death, but social death. Not killing the body but destroying the honor. The punishment was perfect &mdash; <strong>just enough, and not more.</strong> The promise was kept. The dharma was upheld. The brahmana order was protected. And justice was served.</p>
        <p class="sub-heading">Text 58 &mdash; The Grief Continues</p>
        <p>And after all of this &mdash; the pursuit, the capture, the debate, the verdict, the punishment &mdash; the Pandavas and Draupadi performed the proper rituals for their dead. The sons were still gone. The grief was still real. Justice had been done. But the grief remained. And the Bhagavatam does not pretend otherwise. <em>Life continues. Grief and dharma coexist. This is the human condition.</em></p>
        <div class="sit-with-this"><div class="sit-title">&#127 Sit With This</div><p>Krsna's solution satisfied every competing obligation at once &mdash; justice, mercy, promise, dharma and His own will &mdash; all simultaneously. He did not choose one at the expense of another. He found the answer that honored all of them. Is there a situation in your life right now where you feel pulled between two genuine obligations &mdash; where honoring one seems to require betraying another? What would it mean to trust that, like Krsna, there exists a solution that satisfies both?</p></div>
      `}
    ]
  },
  { num: 8,  title: "Prayers by Queen Kunti and Pariksit Saved", available: false },
  { num: 9,  title: "The Passing Away of Bhismadeva in the Presence of Lord Krsna", available: false },

];

function renderHome() {
  document.getElementById('chapterGrid').innerHTML = chapters.map(function(ch) {
    var onclick = ch.available ? 'onclick="openChapter(' + (ch.num-1) + ')"' : '';
    var arrow = ch.available ? '<div class="chapter-arrow">&#8250;</div>' : '';
    var meta = ch.available ? ch.sections.length + ' sections' : 'Coming soon';
    return '<div class="chapter-item ' + (ch.available ? 'available' : 'coming-soon') + '" ' + onclick + '>' +
      '<div class="chapter-num-col">' + ch.num + '</div>' +
      '<div class="chapter-body"><div>' +
      '<div class="chapter-title-text">' + ch.title + '</div>' +
      '<div class="chapter-meta">' + meta + '</div>' +
      '</div>' + arrow + '</div></div>';
  }).join('');
}

function openChapter(idx) {
  const ch = chapters[idx];
  document.getElementById('chapterNum').textContent = 'Canto 1 \u00b7 Chapter ' + ch.num;
  document.getElementById('chapterTitle').textContent = ch.title;
  document.getElementById('breadcrumb-chapter').textContent = 'Chapter ' + ch.num;
  document.getElementById('sectionsContainer').innerHTML = ch.sections.map((sec, i) => `
    <div class="section-block" id="sec-${i}">
      <div class="section-header" onclick="toggleSection(${i})">
        <div class="section-header-left">
          <div class="section-num">Section ${i+1}</div>
          <div class="section-name">${sec.title}</div>
          <div class="section-texts">${sec.texts}</div>
        </div>
        <div class="section-chevron">&#9660;</div>
      </div>
      <div class="section-body">${sec.content}</div>
    </div>
  `).join('');
  showScreen('chapter');
  window.scrollTo(0, 0);
}

function toggleSection(idx) {
  const block = document.getElementById('sec-' + idx);
  const isOpen = block.classList.contains('open');
  document.querySelectorAll('.section-block').forEach(b => b.classList.remove('open'));
  if (!isOpen) {
    block.classList.add('open');
    setTimeout(() => block.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toggleSit(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function goHome() {
  showScreen('home');
  window.scrollTo(0, 0);
}

renderHome();
</script>
